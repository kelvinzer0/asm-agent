name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ========================================================================
  # Build — assemble + link + package
  # ========================================================================
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
      binary_size: ${{ steps.check.outputs.binary_size }}
      visibox_size: ${{ steps.check.outputs.visibox_size }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history for changelog generation

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="dev-$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building asm-agent ${TAG}"

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: /usr/bin/nasm
          key: nasm-apt-stable

      - name: Install build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq nasm binutils curl make

      - name: Cache VisiBox
        id: cache-vb
        uses: actions/cache@v4
        with:
          path: bin/visibox
          key: visibox-0.3.0

      - name: Download VisiBox
        if: steps.cache-vb.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -sLf "https://github.com/kelvinzer0/visibox/releases/download/v0.3.0/visibox-x86_64-linux-gnu.tar.gz" \
            -o /tmp/visibox.tar.gz
          tar xzf /tmp/visibox.tar.gz -C bin/
          chmod +x bin/visibox
          rm -f /tmp/visibox.tar.gz
          echo "VisiBox $(bin/visibox --version 2>/dev/null || echo 'installed')"

      - name: Build asm-agent
        run: make

      - name: Verify binary
        id: check
        run: |
          file asm-agent
          ldd asm-agent 2>&1 || echo "statically linked"
          BSIZE=$(stat -c%s asm-agent)
          VSIZE=$(stat -c%s bin/visibox)
          echo "binary_size=${BSIZE}" >> "$GITHUB_OUTPUT"
          echo "visibox_size=${VSIZE}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "asm-agent : ${BSIZE} bytes"
          echo "visibox   : ${VSIZE} bytes"
          echo "total     : $((BSIZE + VSIZE)) bytes"

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges 2>/dev/null)
          else
            LOG=$(git log -10 --pretty=format:"- %s" --no-merges 2>/dev/null)
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "---"
            echo "**Assets:**"
            echo "- \`asm-agent-x86_64-linux.tar.gz\` — prebuilt binary + VisiBox"
            echo "- \`asm-agent-x86_64-linux.tar.gz.sha256\` — checksum"
          } > RELEASE_NOTES.md
          echo "changelog_generated=true" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          tar czf "asm-agent-x86_64-linux.tar.gz" asm-agent bin/visibox
          sha256sum asm-agent-x86_64-linux.tar.gz > asm-agent-x86_64-linux.tar.gz.sha256
          echo "Package contents:"
          tar tzf asm-agent-x86_64-linux.tar.gz
          echo ""
          echo "SHA256:"
          cat asm-agent-x86_64-linux.tar.gz.sha256

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            asm-agent-x86_64-linux.tar.gz
            asm-agent-x86_64-linux.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Upload artifact (always — used by monitor job)
        uses: actions/upload-artifact@v4
        with:
          name: asm-agent-x86_64-linux
          path: |
            asm-agent
            bin/visibox

  # ========================================================================
  # Monitor — smoke test the built binary
  # ========================================================================
  monitor:
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'

    steps:
      # FIX: Always use artifact download — no more circular release download
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: asm-agent-x86_64-linux

      - name: Smoke tests
        run: |
          chmod +x asm-agent bin/visibox

          echo "=== 1. Binary format ==="
          file asm-agent
          test -x asm-agent || { echo "FAIL: not executable"; exit 1; }
          echo "PASS"

          echo ""
          echo "=== 2. VisiBox execute ==="
          RESULT=$(echo '{"type":"execute","command":"echo hello-release"}' | timeout 5 ./bin/visibox --visibox 2>/dev/null) || true
          if echo "$RESULT" | grep -q "hello-release"; then
            echo "PASS"
          else
            echo "WARN: VisiBox did not return expected output"
          fi

          echo ""
          echo "=== 3. VisiBox session ==="
          RESULT=$(echo '{"type":"session","command":"echo session-test"}' | timeout 5 ./bin/visibox --visibox 2>/dev/null) || true
          if echo "$RESULT" | grep -q "session-test"; then
            echo "PASS: session type works"
          else
            echo "INFO: session type not yet supported by this VisiBox version"
          fi

          echo ""
          echo "=== 4. VisiBox search_jump ==="
          RESULT=$(echo '{"type":"search_jump","response_id":"test","keyword":"test"}' | timeout 5 ./bin/visibox --visibox 2>/dev/null) || true
          echo "INFO: search_jump request accepted"

          echo ""
          echo "=== 5. VisiBox fetch_page ==="
          RESULT=$(echo '{"type":"fetch_page","response_id":"test","cursor":"0"}' | timeout 5 ./bin/visibox --visibox 2>/dev/null) || true
          echo "INFO: fetch_page request accepted"

          echo ""
          echo "=== All smoke tests completed ==="

      - name: Size report
        run: |
          BSIZE=${{ needs.build.outputs.binary_size }}
          VSIZE=${{ needs.build.outputs.visibox_size }}
          echo "## Build Report" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------|" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$BSIZE" ] && [ "$BSIZE" != "" ]; then
            echo "| asm-agent | ${BSIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$VSIZE" ] && [ "$VSIZE" != "" ]; then
            echo "| visibox   | ${VSIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$BSIZE" ] && [ -n "$VSIZE" ] && [ "$BSIZE" != "" ] && [ "$VSIZE" != "" ]; then
            TOTAL=$((BSIZE + VSIZE))
            echo "| **total** | **${TOTAL} bytes** |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** Smoke tests passed" >> "$GITHUB_STEP_SUMMARY"

  # ========================================================================
  # Notify — post build result
  # ========================================================================
  notify:
    needs: [build, monitor]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Release summary
        run: |
          TAG="${{ needs.build.outputs.version }}"
          BSIZE="${{ needs.build.outputs.binary_size }}"
          RESULT="success"
          if [ "${{ needs.monitor.result }}" != "success" ]; then
            RESULT="monitor-failed"
          fi

          echo "## Release ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Monitor | ${{ needs.monitor.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$RESULT" = "success" ]; then
            MSG="Release ${TAG} published."
            if [ -n "$BSIZE" ] && [ "$BSIZE" != "" ]; then
              MSG="${MSG} Binary: ${BSIZE} bytes."
            fi
            echo "${MSG}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Build succeeded but smoke tests failed. Check monitor job logs." >> "$GITHUB_STEP_SUMMARY"
          fi